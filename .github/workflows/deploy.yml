name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  deploy-staging:
    name: Deploy to Staging (Amplify)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://develop.gatectr.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PRISMA_SKIP_GENERATE: "true"
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Check staging DB secret
        id: staging_db
        run: |
          if [ -n "${{ secrets.STAGING_DATABASE_URL }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️  STAGING_DATABASE_URL not configured — skipping migrations"
          fi

      - name: Generate Prisma Client
        if: steps.staging_db.outputs.available == 'true'
        run: pnpm prisma generate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Run database migrations
        if: steps.staging_db.outputs.available == 'true'
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Seed outreach data (idempotent)
        if: steps.staging_db.outputs.available == 'true'
        run: pnpm seed:outreach
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Check Amplify secrets
        id: amplify_staging
        run: |
          if [ -n "${{ secrets.AMPLIFY_APP_ID_STAGING }}" ] && [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️  Amplify secrets not configured — skipping deployment trigger"
          fi

      - name: Trigger Amplify deployment (staging)
        if: steps.amplify_staging.outputs.available == 'true'
        run: |
          aws amplify start-job \
            --app-id ${{ secrets.AMPLIFY_APP_ID_STAGING }} \
            --branch-name develop \
            --job-type RELEASE
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Notify deployment success
        if: success()
        run: echo "✅ Staging deploy complete (Amplify triggered if secrets configured)"

  deploy-production:
    name: Deploy to Production (Amplify)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://gatectr.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PRISMA_SKIP_GENERATE: "true"
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Generate Prisma Client
        run: pnpm prisma generate
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL_MAIN }}

      - name: Wake up Neon database
        run: |
          node -e "
          const { Client } = require('pg');
          async function wake() {
            for (let i = 0; i < 5; i++) {
              try {
                const client = new Client({ connectionString: process.env.DATABASE_URL, connectionTimeoutMillis: 10000 });
                await client.connect();
                await client.query('SELECT 1');
                await client.end();
                console.log('DB is awake after attempt ' + (i+1));
                process.exit(0);
              } catch(e) {
                console.log('Attempt ' + (i+1) + ' failed: ' + e.message + ' — retrying in 5s');
                await new Promise(r => setTimeout(r, 5000));
              }
            }
            console.log('DB did not wake up in time, proceeding anyway');
          }
          wake();
          "
        env:
          DATABASE_URL: ${{ secrets.NEON_DIRECT_URL_MAIN }}

      - name: Run database migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.NEON_DIRECT_URL_MAIN }}
          PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: "1"

      - name: Seed outreach data (idempotent)
        run: pnpm seed:outreach
        env:
          DATABASE_URL: ${{ secrets.NEON_DIRECT_URL_MAIN }}

      - name: Check Amplify secrets
        id: amplify_prod
        run: |
          if [ -n "${{ secrets.AMPLIFY_APP_ID_PRODUCTION }}" ] && [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️  Amplify secrets not configured — skipping deployment trigger"
          fi

      - name: Trigger Amplify deployment (production)
        if: steps.amplify_prod.outputs.available == 'true'
        run: |
          aws amplify start-job \
            --app-id ${{ secrets.AMPLIFY_APP_ID_PRODUCTION }} \
            --branch-name main \
            --job-type RELEASE
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Create Sentry release
        uses: getsentry/action-release@v1
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}
          ignore_missing: true
          ignore_empty: true

      - name: Notify deployment success
        if: success()
        run: echo "✅ Production deploy complete"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Production deployment failed"
          exit 1
