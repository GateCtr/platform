version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
        - pnpm prisma generate
    build:
      commands:
        # Write env vars to .env.production for SSR runtime access
        - env | grep -e DATABASE_URL >> .env.production || true
        - env | grep -e SHADOW_DATABASE_URL >> .env.production || true
        - env | grep -e REDIS_URL >> .env.production || true
        - env | grep -e UPSTASH_REDIS >> .env.production || true
        - env | grep -e CLERK >> .env.production || true
        - env | grep -e NEXT_PUBLIC_ >> .env.production || true
        - env | grep -e STRIPE >> .env.production || true
        - env | grep -e RESEND >> .env.production || true
        - env | grep -e ENCRYPTION_KEY >> .env.production || true
        - env | grep -e WEBHOOK_SIGNING_SECRET >> .env.production || true
        - env | grep -e GATECTR_INTERNAL_SECRET >> .env.production || true
        - env | grep -e SENTRY >> .env.production || true
        - env | grep -e R2_ >> .env.production || true
        - env | grep -e TELEGRAM >> .env.production || true
        - env | grep -e ENABLE_ >> .env.production || true
        - env | grep -e LAUNCH_DATE >> .env.production || true
        - env | grep -e PH_COUPON_ID >> .env.production || true
        - env | grep -e SLACK_LAUNCH_WEBHOOK_URL >> .env.production || true
        - env | grep -e DEMO_SANDBOX_OPENAI_KEY >> .env.production || true
        - env | grep -e EMAIL_FROM >> .env.production || true
        - env | grep -e INBOX_ >> .env.production || true
        - env | grep -e OUTREACH_ >> .env.production || true
        - env | grep -e EMAIL_ASSET_BASE_URL >> .env.production || true
        - pnpm build
        # Show sizes before cleanup for debugging
        - echo "=== .next sizes before cleanup ===" && du -sh .next/* 2>/dev/null || true
        # Remove cache and source maps to reduce artifact size
        - rm -rf .next/cache
        - find .next -name "*.map" -delete 2>/dev/null || true
        # Show final size
        - echo "=== .next total after cleanup ===" && du -sh .next 2>/dev/null || true
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
