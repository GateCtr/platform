version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
        - pnpm prisma generate
    build:
      commands:
        - pnpm build
        # Remove build cache from .next before packaging — it's preserved separately
        # in the Amplify cache layer above and would push the artifact over 230MB
        - rm -rf .next/cache
  artifacts:
    # Must be .next (not .next/standalone) — Amplify Hosting compute reads
    # required-server-files.json from this directory to configure the SSR runtime
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
