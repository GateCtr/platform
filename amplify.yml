version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
        - pnpm prisma generate
    build:
      commands:
        - pnpm build
        # Strip everything that's not needed at runtime to stay under 230MB
        # Keep: server/, static/, required-server-files.json, BUILD_ID, routes-manifest.json
        - rm -rf .next/cache
        - rm -rf .next/standalone
        - find .next/server -name "*.map" -delete 2>/dev/null || true
        - find .next/server -name "*.pack" -delete 2>/dev/null || true
        - find .next -name "*.map" -maxdepth 2 -delete 2>/dev/null || true
        # Log final size for debugging
        - du -sh .next && du -sh .next/* 2>/dev/null || true
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
