version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile
        - pnpm prisma generate
    build:
      commands:
        - pnpm build
        # Copy public assets and static files into standalone output
        - cp -r public .next/standalone/public
        - cp -r .next/static .next/standalone/.next/static
  artifacts:
    # Deploy only the standalone output — excludes .next/cache and node_modules
    baseDirectory: .next/standalone
    files:
      - "**/*"
  cache:
    paths:
      # Cache node_modules and Next.js build cache between deployments
      - node_modules/**/*
      - .next/cache/**/*
