services:
  postgres:
    image: postgres:18-alpine
    container_name: gatectr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gatectr
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: gatectr_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatectr -d gatectr_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gatectr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
